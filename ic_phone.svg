<svg
  viewBox="0 0 64 64"
  xmlns="http://www.w3.org/2000/svg"
  fill="none"
  stroke="currentColor"
  stroke-width="1.3"
  stroke-linecap="round"
  stroke-linejoin="round">

  <!-- Phone body -->
  <rect x="20" y="6" width="24" height="52" rx="3" />

  <!-- Top speaker -->
  <line x1="28" y1="10.5" x2="36" y2="10.5"
        stroke-width="2" />

  <!-- Left side buttons -->
  <rect x="19.5" y="18" width="1.0" height="7" rx="0.3" />
  <rect x="19.5" y="28" width="1.0" height="5" rx="0.7" />

  <!-- Right side power button -->
  <rect x="43.5" y="18" width="1.0" height="7" rx="0.7" />

</svg>